<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            margin: 8px 0;
        }
        .highlight {
            color: #00ffff;
            font-weight: bold;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Invitation pour <span class="highlight" id="guest-name">Omar El Guennouni</span></h1>
    <p>Vous êtes cordialement invité à notre événement spécial.</p>
    <p>Lieu : <span class="highlight" id="event-location">Le Jardin des Roses</span></p>
    <p>Date : <span class="highlight" id="event-date">Demain</span></p>
    <p>Heure : <span class="highlight" id="event-time">18:00</span></p>

    <button onclick="confirmAttendance()">Confirmer ma présence</button>
    <p id="confirmation" style="margin-top:20px; font-weight:bold;"></p>
</div>

<script>
    // Fonction pour confirmer la présence
    function confirmAttendance() {
        const name = document.getElementById('guest-name').textContent;
        document.getElementById('confirmation').textContent = `Merci, ${name}, pour votre confirmation ! 🎉`;
    }

    // Facile à modifier demain : nom, lieu, date, heure
    function updateInvitation(newName, newLocation, newDate, newTime) {
        document.getElementById('guest-name').textContent = newName;
        document.getElementById('event-location').textContent = newLocation;
        document.getElementById('event-date').textContent = newDate;
        document.getElementById('event-time').textContent = newTime;
    }

    // Exemple pour changer demain
    // updateInvitation("Omar El Guennouni", "Salle des Fêtes", "31 Mars 2026", "19:00");
</script>

</body>
</html>
