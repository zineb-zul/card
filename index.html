<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 26px;
        }

        p {
            font-size: 1.1em;
            margin: 10px 0;
            opacity: 0.9;
        }

        .highlight {
            color: #ffd166;
            font-weight: 600;
        }

        button {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff7b00, #ff3d00);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #confirmation {
            margin-top: 20px;
            font-weight: 500;
            color: #90ee90;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Invitation pour <span class="highlight" id="guest-name">Omar El Guennouni</span></h1>
    <p>Vous êtes cordialement invité à notre événement spécial.</p>
    <p>📍 Lieu : <span class="highlight" id="event-location">Marina Salé</span></p>
    <p>📅 Date : <span class="highlight" id="event-date">Demain</span></p>
    <p>⏰ Heure : <span class="highlight" id="event-time">14:00</span></p>

    <button onclick="confirmAttendance()">Confirmer ma présence</button>
    <p id="confirmation"></p>
</div>

<script>
    function confirmAttendance() {
        const name = document.getElementById('guest-name').textContent;
        document.getElementById('confirmation').textContent = `Merci, ${name}, pour votre confirmation ! 🎉`;
    }

    function updateInvitation(newName, newLocation, newDate, newTime) {
        document.getElementById('guest-name').textContent = newName;
        document.getElementById('event-location').textContent = newLocation;
        document.getElementById('event-date').textContent = newDate;
        document.getElementById('event-time').textContent = newTime;
    }
</script>

</body>
</html>
